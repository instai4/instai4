<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes rotate3d {
        0% { transform: rotateY(0deg) rotateX(0deg); }
        100% { transform: rotateY(360deg) rotateX(360deg); }
      }
      .cube {
        animation: rotate3d 15s infinite linear;
        transform-origin: 150px 150px;
        transform-style: preserve-3d;
      }
      .face {
        fill: rgba(102, 126, 234, 0.2);
        stroke: #667eea;
        stroke-width: 2;
      }
      .face1 { transform: translateZ(50px); }
      .face2 { transform: rotateY(90deg) translateZ(50px); }
      .face3 { transform: rotateY(180deg) translateZ(50px); }
      .face4 { transform: rotateY(270deg) translateZ(50px); }
      .face5 { transform: rotateX(90deg) translateZ(50px); }
      .face6 { transform: rotateX(-90deg) translateZ(50px); }
    </style>
  </defs>
  <g class="cube">
    <path class="face face1" d="M 50 50 L 250 50 L 250 250 L 50 250 Z" fill="rgba(102, 126, 234, 0.3)"/>
    <path class="face face2" d="M 50 50 L 250 50 L 250 250 L 50 250 Z" fill="rgba(118, 75, 162, 0.3)"/>
    <path class="face face3" d="M 50 50 L 250 50 L 250 250 L 50 250 Z" fill="rgba(219, 112, 147, 0.3)"/>
    <path class="face face4" d="M 50 50 L 250 50 L 250 250 L 50 250 Z" fill="rgba(102, 126, 234, 0.3)"/>
    <path class="face face5" d="M 50 50 L 250 50 L 250 250 L 50 250 Z" fill="rgba(118, 75, 162, 0.3)"/>
    <path class="face face6" d="M 50 50 L 250 50 L 250 250 L 50 250 Z" fill="rgba(219, 112, 147, 0.3)"/>
  </g>
  <text x="150" y="160" text-anchor="middle" fill="white" font-family="Arial" font-size="40" font-weight="bold">👁️</text>
</svg>
