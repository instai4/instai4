<svg width="100%" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="particleGrad">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#667eea;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <g style="animation: particleFloat 15s infinite linear;">
    <circle cx="100" cy="50" r="3" fill="url(#particleGrad)" style="animation: float3d 3s infinite;"/>
    <circle cx="300" cy="80" r="5" fill="url(#particleGrad)" style="animation: float3d 3s infinite 0.5s;"/>
    <circle cx="500" cy="40" r="4" fill="url(#particleGrad)" style="animation: float3d 3s infinite 1s;"/>
    <circle cx="700" cy="90" r="6" fill="url(#particleGrad)" style="animation: float3d 3s infinite 1.5s;"/>
    <circle cx="900" cy="60" r="3" fill="url(#particleGrad)" style="animation: float3d 3s infinite 2s;"/>
    <circle cx="1100" cy="70" r="5" fill="url(#particleGrad)" style="animation: float3d 3s infinite 2.5s;"/>
  </g>
</svg>
